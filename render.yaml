services:
  - type: web
    name: tgbot-monitor
    runtime: node
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npx nest build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
